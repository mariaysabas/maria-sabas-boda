  <div>24 de abril, 2027 &middot; Salamanca</div>

<script>
  // Edita estas preguntas para que sean sobre vosotros.
  const quiz = [
    { q: "¿Dónde os conocisteis?", opts: ["En una cafetería","En clase","Por amigos en común","En otra boda"], correct: 2 },
    { q: "¿Quién dijo 'te quiero' primero?", opts: ["María","Sabas","Los dos a la vez","Todavía discuten sobre esto"], correct: 0 },
    { q: "¿Cuál es vuestro plan de cita favorito?", opts: ["Maratón de pelis","Probar un restaurante nuevo","Senderismo","Juegos de mesa en casa"], correct: 1 },
    { q: "¿Dónde fue la pedida de mano?", opts: ["De viaje","En casa","En un restaurante especial","De excursión"], correct: 3 },
    { q: "¿Cuál es la canción de vuestro primer baile?", opts: ["Un clásico de los 90","La que sonaba en la primera cita","La banda sonora de una peli que visteis juntos","¡Sorpresa, lo veréis ese día!"], correct: 3 }
  ];
  let qi = 0, score = 0;

  function renderQuestion(){
    const item = quiz[qi];
    document.getElementById('quiz-progress').textContent = `Pregunta ${qi+1} de ${quiz.length}`;
    document.getElementById('quiz-q').textContent = item.q;
    document.getElementById('quiz-score').textContent = `Puntos: ${score}`;
    document.getElementById('quiz-next').style.display = 'none';
    const optsEl = document.getElementById('quiz-opts');
    optsEl.innerHTML = '';
    item.opts.forEach((opt, idx) => {
      const b = document.createElement('button');
      b.className = 'quiz-opt';
      b.textContent = opt;
      b.addEventListener('click', () => selectAnswer(idx));
      optsEl.appendChild(b);
    });
  }

  function selectAnswer(idx){
    const item = quiz[qi];
    const buttons = document.querySelectorAll('.quiz-opt');
    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === item.correct) b.classList.add('correct');
      else if (i === idx) b.classList.add('wrong');
    });
    if (idx === item.correct) score++;
    document.getElementById('quiz-score').textContent = `Puntos: ${score}`;
    if (qi < quiz.length - 1) {
      document.getElementById('quiz-next').style.display = 'inline-block';
    } else {
      document.getElementById('quiz-progress').textContent = `¡Completado! Puntuación final: ${score} / ${quiz.length}`;
    }
  }

  document.getElementById('quiz-next').addEventListener('click', () => {
    qi++;
    renderQuestion();
  });

  renderQuestion();
</script>

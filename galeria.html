<script>
  // ---- Galería en directo desde Google Drive ----
  // Para cambiar la carpeta o la clave, edita solo estas dos líneas:
  const DRIVE_API_KEY = "AIzaSyAG4byz5s9mopJxosZ3Cz8Wm6s245QL6-A";
  const DRIVE_FOLDER_ID = "1cIBrMNFRiooyJpw-B5QmIMw1GVS_dMDyWVhs_yY04bYgOW-mwnvv3qzB_Q44Gd6UELfZpk00";
  const PAGE_SIZE = 20; // cuántas tarjetas se muestran cada vez, en fotos y en vídeos

  const photosGrid = document.getElementById('gallery-grid-photos');
  const videosGrid = document.getElementById('gallery-grid-videos');
  const loadMorePhotosBtn = document.getElementById('load-more-photos');
  const loadMoreVideosBtn = document.getElementById('load-more-videos');
  const refreshBtn = document.getElementById('gallery-refresh');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxVideo = document.getElementById('lightbox-video');
  const lightboxClose = document.getElementById('lightbox-close');

  let allPhotos = [];
  let allVideos = [];
  let photosShown = 0;
  let videosShown = 0;

  async function loadGallery(){
    photosGrid.innerHTML = '<div class="gallery-status">Cargando fotos&hellip;</div>';
    videosGrid.innerHTML = '<div class="gallery-status">Cargando vídeos&hellip;</div>';
    loadMorePhotosBtn.style.display = 'none';
    loadMoreVideosBtn.style.display = 'none';

    try {
      const url = `https://www.googleapis.com/drive/v3/files?q='${DRIVE_FOLDER_ID}'+in+parents+and+(mimeType+contains+'image/'+or+mimeType+contains+'video/')+and+trashed=false&fields=files(id,name,mimeType,thumbnailLink,createdTime)&orderBy=createdTime+desc&pageSize=1000&key=${DRIVE_API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Drive API error ' + res.status);
      const data = await res.json();
      const files = data.files || [];

      allPhotos = files.filter(f => f.mimeType && f.mimeType.startsWith('image/'));
      allVideos = files.filter(f => f.mimeType && f.mimeType.startsWith('video/'));
      photosShown = 0;
      videosShown = 0;

      renderMorePhotos();
      renderMoreVideos();
    } catch (err){
      console.error(err);
      const msg = '<div class="gallery-status">No se han podido cargar los archivos ahora mismo. Comprueba que la carpeta de Drive siga compartida como "Cualquier persona con el enlace" y que la clave de API sea correcta.</div>';
      photosGrid.innerHTML = msg;
      videosGrid.innerHTML = '';
    }
  }

  function renderMorePhotos(){
    if (photosShown === 0) photosGrid.innerHTML = '';
    if (allPhotos.length === 0){
      photosGrid.innerHTML = '<div class="gallery-status">Todavía no hay fotos. ¡Sé el primero en subir una!</div>';
      return;
    }
    const next = allPhotos.slice(photosShown, photosShown + PAGE_SIZE);
    next.forEach(file => {
      const smallSrc = file.thumbnailLink;
      const bigSrc = smallSrc ? smallSrc.replace(/=s\d+$/, '=s1600') : '';
      const btn = document.createElement('button');
      btn.className = 'gallery-photo';
      btn.setAttribute('aria-label', 'Ver foto ampliada: ' + (file.name || ''));
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = smallSrc;
      img.alt = file.name || 'Foto de la boda';
      btn.appendChild(img);
      btn.addEventListener('click', () => openLightboxImage(bigSrc || smallSrc));
      photosGrid.appendChild(btn);
    });
    photosShown += next.length;
    loadMorePhotosBtn.style.display = (photosShown < allPhotos.length) ? 'inline-block' : 'none';
  }

  function renderMoreVideos(){
    if (videosShown === 0) videosGrid.innerHTML = '';
    if (allVideos.length === 0){
      videosGrid.innerHTML = '<div class="gallery-status">Todavía no hay vídeos. ¡Sé el primero en subir uno!</div>';
      return;
    }
    const next = allVideos.slice(videosShown, videosShown + PAGE_SIZE);
    next.forEach(file => {
      const btn = document.createElement('button');
      btn.className = 'gallery-photo gallery-video-tile';
      btn.setAttribute('aria-label', 'Reproducir vídeo: ' + (file.name || ''));
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = file.thumbnailLink || '';
      img.alt = file.name || 'Vídeo de la boda';
      const play = document.createElement('span');
      play.className = 'play-icon';
      play.innerHTML = '&#9658;';
      btn.appendChild(img);
      btn.appendChild(play);
      btn.addEventListener('click', () => openLightboxVideo(file.id));
      videosGrid.appendChild(btn);
    });
    videosShown += next.length;
    loadMoreVideosBtn.style.display = (videosShown < allVideos.length) ? 'inline-block' : 'none';
  }

  function openLightboxImage(src){
    lightboxVideo.src = '';
    lightboxVideo.style.display = 'none';
    lightboxImg.style.display = 'block';
    lightboxImg.src = src;
    lightbox.classList.add('open');
  }
  function openLightboxVideo(fileId){
    lightboxImg.style.display = 'none';
    lightboxImg.src = '';
    lightboxVideo.style.display = 'block';
    lightboxVideo.src = `https://drive.google.com/file/d/${fileId}/preview`;
    lightbox.classList.add('open');
  }
  function closeLightbox(){
    lightbox.classList.remove('open');
    lightboxImg.src = '';
    lightboxVideo.src = '';
  }
  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

  refreshBtn.addEventListener('click', loadGallery);
  loadMorePhotosBtn.addEventListener('click', renderMorePhotos);
  loadMoreVideosBtn.addEventListener('click', renderMoreVideos);
  loadGallery();
</script>

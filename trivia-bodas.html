<script>
  // Cada pregunta admite un campo "img" opcional con una URL de imagen.
  // Déjalo vacío ("") si no quieres imagen. Usa solo imágenes con licencia libre
  // (Wikimedia Commons, vuestras propias fotos, etc.) — evita imágenes de resultados
  // de Google normales, que casi siempre tienen derechos de autor.
  const quiz = [
    {
      q: "En muchas bodas judías, ¿qué se rompe tradicionalmente al final de la ceremonia?",
      img: "",
      opts: ["Un plato", "Una copa de cristal", "Un espejo", "Una vela"],
      correct: 1
    },
    {
      q: "¿De qué país es tradición que la novia lleve un objeto azul, uno prestado, uno viejo y uno nuevo?",
      img: "",
      opts: ["Francia", "Reino Unido", "Italia", "Portugal"],
      correct: 1
    },
    {
      q: "En la tradición hindú, ¿cómo se llama el ritual en el que los novios dan siete vueltas alrededor del fuego sagrado?",
      img: "",
      opts: ["Saptapadi", "Mehndi", "Sangeet", "Baraat"],
      correct: 0
    },
    {
      q: "¿En qué país es tradicional que los invitados rompan platos frente a la puerta de los novios la noche antes de la boda, para dar buena suerte?",
      img: "",
      opts: ["Alemania", "Suecia", "Grecia", "Polonia"],
      correct: 0
    },
    {
      q: "¿Cuánto duró, aproximadamente, el matrimonio más corto registrado oficialmente (según varias fuentes de curiosidades)?",
      img: "",
      opts: ["3 minutos", "6 horas", "1 día", "1 semana"],
      correct: 0
    },
    {
      q: "¿Qué famosa pareja real británica se casó en la Abadía de Westminster en 2011?",
      img: "",
      opts: ["Harry y Meghan", "Guillermo y Kate", "Carlos y Diana", "Eduardo y Sophie"],
      correct: 1
    },
    {
      q: "¿En qué ciudad se casaron Carlos y Diana de Gales en 1981?",
      img: "",
      opts: ["Windsor", "Edimburgo", "Londres (Catedral de San Pablo)", "Bath"],
      correct: 2
    },
    {
      q: "¿Cuál es el color tradicional del vestido de novia en muchas bodas chinas, asociado a la buena suerte?",
      img: "",
      opts: ["Blanco", "Rojo", "Dorado", "Verde"],
      correct: 1
    },
    {
      q: "En las bodas tradicionales escocesas, ¿qué prenda suele llevar el novio?",
      img: "",
      opts: ["Un chaleco bordado", "Un kilt (falda escocesa)", "Una capa de lana", "Un sombrero de copa"],
      correct: 1
    },
    {
      q: "¿Qué actor y actriz protagonizaron una de las bodas más mediáticas de Hollywood al casarse (y divorciarse, y volverse a casar) dos veces, en los años 60 y 70?",
      img: "",
      opts: ["Richard Burton y Elizabeth Taylor", "Paul Newman y Joanne Woodward", "Humphrey Bogart y Lauren Bacall", "Marlon Brando y Anna Kashfi"],
      correct: 0
    }
  ];

  let qi = 0, score = 0;

  function renderQuestion(){
    const item = quiz[qi];
    document.getElementById('quiz-progress').textContent = `Pregunta ${qi+1} de ${quiz.length}`;
    document.getElementById('quiz-q').textContent = item.q;
    document.getElementById('quiz-score').textContent = `Puntos: ${score}`;
    document.getElementById('quiz-next').style.display = 'none';

    const imgEl = document.getElementById('quiz-img');
    if (item.img){
      imgEl.src = item.img;
      imgEl.alt = item.q;
      imgEl.style.display = 'block';
    } else {
      imgEl.style.display = 'none';
      imgEl.src = '';
    }

    const optsEl = document.getElementById('quiz-opts');
    optsEl.innerHTML = '';
    item.opts.forEach((opt, idx) => {
      const b = document.createElement('button');
      b.className = 'quiz-opt';
      b.textContent = opt;
      b.addEventListener('click', () => selectAnswer(idx));
      optsEl.appendChild(b);
    });
  }

  function selectAnswer(idx){
    const item = quiz[qi];
    const buttons = document.querySelectorAll('.quiz-opt');
    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === item.correct) b.classList.add('correct');
      else if (i === idx) b.classList.add('wrong');
    });
    if (idx === item.correct) score++;
    document.getElementById('quiz-score').textContent = `Puntos: ${score}`;
    if (qi < quiz.length - 1) {
      document.getElementById('quiz-next').style.display = 'inline-block';
    } else {
      document.getElementById('quiz-progress').textContent = `¡Completado! Puntuación final: ${score} / ${quiz.length}`;
    }
  }

  document.getElementById('quiz-next').addEventListener('click', () => {
    qi++;
    renderQuestion();
  });

  renderQuestion();
</script>
